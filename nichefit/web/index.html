<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NicheFit — score an X audience for a niche</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { background:#0b1020; }
    .glass { background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { animation: spin 1s linear infinite; }
  </style>
</head>
<body class="text-slate-100">
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;

const TIER_COLORS = { A:"#22c55e", B:"#84cc16", C:"#f59e0b", D:"#ef4444" };
const fmt = (n) => (n||0).toLocaleString();
const usd = (n) => "$" + (n||0).toFixed(n < 1 ? 4 : 2);

// ----- small SVG widgets --------------------------------------------------
function Gauge({ value }) {
  const r = 80, c = Math.PI * r, pct = Math.max(0, Math.min(100, value)) / 100;
  const color = value >= 80 ? "#22c55e" : value >= 60 ? "#84cc16" : value >= 40 ? "#f59e0b" : "#ef4444";
  return (
    <div className="relative flex items-center justify-center" style={{width:220,height:130}}>
      <svg width="220" height="130" viewBox="0 0 220 130">
        <path d="M20 120 A 80 80 0 0 1 200 120" fill="none" stroke="rgba(255,255,255,0.1)" strokeWidth="16" strokeLinecap="round"/>
        <path d="M20 120 A 80 80 0 0 1 200 120" fill="none" stroke={color} strokeWidth="16"
          strokeLinecap="round" strokeDasharray={`${c*pct} ${c}`}/>
      </svg>
      <div className="absolute bottom-0 flex flex-col items-center">
        <span className="text-5xl font-bold" style={{color}}>{Math.round(value)}</span>
        <span className="text-xs text-slate-400">audience score / 100</span>
      </div>
    </div>
  );
}

function Donut({ tiers }) {
  const total = Object.values(tiers).reduce((a,b)=>a+b,0) || 1;
  let acc = 0; const r = 60, c = 2*Math.PI*r;
  const segs = ["A","B","C","D"].map(t => {
    const frac = (tiers[t]||0)/total;
    const seg = <circle key={t} cx="80" cy="80" r={r} fill="none" stroke={TIER_COLORS[t]} strokeWidth="22"
      strokeDasharray={`${c*frac} ${c}`} strokeDashoffset={-c*acc} transform="rotate(-90 80 80)"/>;
    acc += frac; return seg;
  });
  return (
    <div className="flex items-center gap-5">
      <svg width="160" height="160">{segs}
        <text x="80" y="86" textAnchor="middle" className="fill-white" fontSize="22" fontWeight="bold">{total}</text>
      </svg>
      <div className="space-y-1 text-sm">
        {["A","B","C","D"].map(t=>(
          <div key={t} className="flex items-center gap-2">
            <span className="inline-block w-3 h-3 rounded-sm" style={{background:TIER_COLORS[t]}}></span>
            <span className="font-medium">Tier {t}</span>
            <span className="text-slate-400">{tiers[t]||0} ({Math.round((tiers[t]||0)/total*100)}%)</span>
          </div>
        ))}
      </div>
    </div>
  );
}

function CriterionBar({ c }) {
  const pct = (c.avg / c.max) * 100;
  return (
    <div>
      <div className="flex justify-between text-sm mb-1">
        <span>{c.label}</span>
        <span className="text-slate-400">{c.avg} / {c.max}</span>
      </div>
      <div className="h-2.5 rounded-full bg-white/10 overflow-hidden">
        <div className="h-full rounded-full bg-gradient-to-r from-indigo-400 to-fuchsia-400" style={{width:pct+"%"}}/>
      </div>
    </div>
  );
}

function TierBadge({ tier }) {
  return <span className="px-2 py-0.5 rounded text-xs font-bold text-black" style={{background:TIER_COLORS[tier]}}>{tier}</span>;
}

// ----- main app -----------------------------------------------------------
function App() {
  const [cfg, setCfg] = useState(null);
  const [handle, setHandle] = useState("");
  const [niche, setNiche] = useState("");
  const [custom, setCustom] = useState("");
  const [sample, setSample] = useState(100);
  const [scanDepth, setScanDepth] = useState(3000);
  const [concurrency, setConcurrency] = useState(8);
  const [webLookup, setWebLookup] = useState(true);
  const [skipBots, setSkipBots] = useState(true);
  const [forceRefresh, setForceRefresh] = useState(false);
  const [mode, setMode] = useState("custom");
  const [est, setEst] = useState(null);
  const [stage, setStage] = useState("form"); // form | confirm | running | done
  const [progress, setProgress] = useState(null);
  const [result, setResult] = useState(null);
  const [error, setError] = useState(null);
  const pollRef = useRef(null);
  const [tab, setTab] = useState("audience");      // audience | person
  const [showAdv, setShowAdv] = useState(false);
  const [sortBy, setSortBy] = useState("grade");   // grade | followers
  const [query, setQuery] = useState("");
  const [personResult, setPersonResult] = useState(null);
  const [personBusy, setPersonBusy] = useState(false);

  useEffect(() => {
    fetch("/api/config").then(r=>r.json()).then(c=>{
      setCfg(c);
      setNiche(c.niches[0]);
      setSample(c.default_sample_size);
      setScanDepth(c.default_pool_size);
      setConcurrency(c.default_concurrency);
    });
    return () => clearInterval(pollRef.current);
  }, []);

  const activeNiche = () => niche === "__custom__" ? custom.trim() : niche;

  async function getEstimate(selectedMode = "custom") {
    setError(null);
    if (!handle.trim()) { setError("Paste an X link or @handle."); return; }
    if (!activeNiche()) { setError("Pick or type a niche."); return; }
    setMode(selectedMode);
    const r = await fetch("/api/estimate", { method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ handle, niche: activeNiche(), mode: selectedMode, sample_size: +sample, pool_size: +scanDepth, web_lookup: webLookup, skip_bots: skipBots, force_refresh: forceRefresh })});
    if (!r.ok) { setError((await r.json()).detail || "Estimate failed."); return; }
    setEst(await r.json());
    setStage("confirm");
  }

  async function startRun() {
    setError(null); setResult(null); setProgress(null); setStage("running");
    const r = await fetch("/api/analyze", { method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ handle, niche: activeNiche(), mode, sample_size:+sample, pool_size:+scanDepth, concurrency:+concurrency, web_lookup:webLookup, skip_bots:skipBots, force_refresh:forceRefresh })});
    if (!r.ok) { setError((await r.json()).detail || "Failed to start."); setStage("confirm"); return; }
    const { job_id } = await r.json();
    pollRef.current = setInterval(async () => {
      const p = await (await fetch("/api/progress/"+job_id)).json();
      setProgress(p);
      if (p.status === "done") { clearInterval(pollRef.current); setResult(p.result); setStage("done"); }
      if (p.status === "error") { clearInterval(pollRef.current); setError(p.error); setStage("confirm"); }
    }, 900);
  }

  async function analyzePerson() {
    setError(null); setPersonResult(null);
    if (!handle.trim()) { setError("Enter an X link or @handle."); return; }
    if (!activeNiche()) { setError("Pick or type an area / niche."); return; }
    setPersonBusy(true);
    try {
      const r = await fetch("/api/person", { method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ handle, niche: activeNiche() })});
      if (!r.ok) { setError((await r.json()).detail || "Analysis failed."); return; }
      setPersonResult(await r.json());
    } catch (e) { setError("Analysis failed: " + e.message); }
    finally { setPersonBusy(false); }
  }

  function reset() { setStage("form"); setResult(null); setProgress(null); setEst(null); setError(null); }

  if (!cfg) return <div className="min-h-screen flex items-center justify-center text-slate-400">Loading…</div>;

  const mock = cfg.mock.apify || cfg.mock.anthropic;

  return (
    <div className="min-h-screen max-w-5xl mx-auto px-5 py-8">
      <header className="flex items-center justify-between mb-6">
        <div>
          <h1 className="text-3xl font-bold tracking-tight">Niche<span className="text-fuchsia-400">Fit</span></h1>
          <p className="text-slate-400 text-sm">Score how well an X account's audience fits a niche — follower by follower, with Claude Haiku.</p>
        </div>
        <span className="text-xs text-slate-500">model: {cfg.model}</span>
      </header>

      <div className="rounded-lg p-3 mb-5 text-sm border border-amber-400/30 bg-amber-400/10 text-amber-200">
        🧪 <b>Demo / proof-of-concept.</b> This shows what's possible — scores are
        <b> illustrative, not validated</b>. The rubric, bot filter, and especially
        the follower sampling (limited by the data source, which returns newest
        followers first) all need real fine-tuning before relying on results.
        Treat everything here as directional.
      </div>

      {mock && (
        <div className="glass rounded-lg p-3 mb-5 text-sm text-amber-300">
          ⚠️ Mock mode active{cfg.mock.apify ? " — Apify (bundled sample followers)" : ""}{cfg.mock.anthropic ? " — Haiku (heuristic scoring)" : ""}.
          Add the missing key(s) to <code>.env</code> and restart for live data + real scores.
        </div>
      )}

      {error && <div className="glass rounded-lg p-3 mb-5 text-sm text-red-300">⚠️ {error}</div>}

      {/* FORM */}
      {stage === "form" && (
        <div className="space-y-5">
          {/* tab switch */}
          <div className="flex gap-2">
            <button onClick={()=>{setTab("audience");setError(null);}}
              className={"px-4 py-2 rounded-lg text-sm font-medium transition " + (tab==="audience" ? "bg-fuchsia-500 text-black" : "border border-white/15 text-slate-300 hover:bg-white/5")}>
              Audience analysis
            </button>
            <button onClick={()=>{setTab("person");setError(null);}}
              className={"px-4 py-2 rounded-lg text-sm font-medium transition " + (tab==="person" ? "bg-fuchsia-500 text-black" : "border border-white/15 text-slate-300 hover:bg-white/5")}>
              Single person
            </button>
          </div>

          {/* AUDIENCE TAB */}
          {tab === "audience" && (
            <div className="glass rounded-2xl p-6 space-y-5">
              <div className="grid md:grid-cols-2 gap-4">
                <div>
                  <label className="block text-sm mb-1 text-slate-300">X account link or @handle</label>
                  <input value={handle} onChange={e=>setHandle(e.target.value)} placeholder="https://x.com/naval  or  @naval"
                    className="w-full bg-black/30 rounded-lg px-4 py-3 outline-none border border-white/10 focus:border-fuchsia-400"/>
                </div>
                <NicheField {...{niche,setNiche,custom,setCustom,cfg}}/>
              </div>

              <div className="text-sm text-slate-400">Choose how to analyze the audience:</div>
              <div className="grid md:grid-cols-2 gap-3">
                <button onClick={()=>getEstimate("full")}
                  className="text-left rounded-xl p-4 border border-fuchsia-400/40 bg-fuchsia-400/10 hover:bg-fuchsia-400/20 transition">
                  <div className="font-semibold text-fuchsia-200">⚡ Full account (cheap)</div>
                  <div className="text-xs text-slate-400 mt-1">Random sample of everyone scanned. Measures the bot % — which lowers the overall score. No web research.</div>
                </button>
                <button onClick={()=>getEstimate("top")}
                  className="text-left rounded-xl p-4 border border-indigo-400/40 bg-indigo-400/10 hover:bg-indigo-400/20 transition">
                  <div className="font-semibold text-indigo-200">★ Top followers (deep)</div>
                  <div className="text-xs text-slate-400 mt-1">Ranks everyone scanned by their own follower count, then researches & grades the top ones.</div>
                </button>
              </div>

              <div>
                <button onClick={()=>setShowAdv(!showAdv)} className="text-xs text-slate-400 hover:text-slate-200">
                  {showAdv ? "▾" : "▸"} Advanced / custom run
                </button>
                {showAdv && (
                  <div className="mt-3 space-y-4 border-t border-white/10 pt-4">
                    <div className="grid md:grid-cols-2 gap-4">
                      <div>
                        <label className="block text-sm mb-1 text-slate-300">Sample size (real followers to grade)</label>
                        <input type="number" min="1" max={cfg.hard_cap} value={sample} onChange={e=>setSample(e.target.value)}
                          className="w-full bg-black/30 rounded-lg px-4 py-3 outline-none border border-white/10 focus:border-fuchsia-400"/>
                      </div>
                      <div>
                        <label className="block text-sm mb-1 text-slate-300">Scan depth (followers to scrape)</label>
                        <input type="number" min="200" max={cfg.hard_cap} value={scanDepth} onChange={e=>setScanDepth(e.target.value)}
                          className="w-full bg-black/30 rounded-lg px-4 py-3 outline-none border border-white/10 focus:border-fuchsia-400"/>
                      </div>
                    </div>
                    <div className="grid md:grid-cols-3 gap-3 items-center">
                      <div>
                        <label className="block text-sm mb-1 text-slate-300">Concurrency</label>
                        <input type="number" min="1" max="32" value={concurrency} onChange={e=>setConcurrency(e.target.value)}
                          className="w-full bg-black/30 rounded-lg px-4 py-3 outline-none border border-white/10 focus:border-fuchsia-400"/>
                      </div>
                      <label className="flex items-center gap-2 text-sm text-slate-300 pt-5">
                        <input type="checkbox" checked={webLookup} onChange={e=>setWebLookup(e.target.checked)} className="w-4 h-4"/> Research (web)
                      </label>
                      <label className="flex items-center gap-2 text-sm text-slate-300 pt-5">
                        <input type="checkbox" checked={skipBots} onChange={e=>setSkipBots(e.target.checked)} className="w-4 h-4"/> Skip bots
                      </label>
                    </div>
                    <label className="flex items-center gap-2 text-sm text-slate-300">
                      <input type="checkbox" checked={forceRefresh} onChange={e=>setForceRefresh(e.target.checked)} className="w-4 h-4"/> Force refresh (ignore cache)
                    </label>
                    <button onClick={()=>getEstimate("custom")}
                      className="w-full bg-fuchsia-500 hover:bg-fuchsia-400 transition rounded-lg py-3 font-semibold text-black">
                      Estimate custom run →
                    </button>
                  </div>
                )}
              </div>

              <p className="text-xs text-amber-300/70">⚠️ Scans your <b>{fmt(scanDepth)}</b> most-recent followers — raise “scan depth” in Advanced to ≥ your follower count to reach everyone (the API returns newest-first).</p>
            </div>
          )}

          {/* SINGLE PERSON TAB */}
          {tab === "person" && (
            <div className="glass rounded-2xl p-6 space-y-4">
              <div>
                <h2 className="text-lg font-semibold">Analyze one person's influence</h2>
                <p className="text-xs text-slate-400 mt-1">Enter anyone's handle and an area — we research who they are and grade their influence / fit for it. (This doesn't analyze their followers.)</p>
              </div>
              <div className="grid md:grid-cols-2 gap-4">
                <div>
                  <label className="block text-sm mb-1 text-slate-300">X link or @handle of the person</label>
                  <input value={handle} onChange={e=>setHandle(e.target.value)} placeholder="@sama"
                    className="w-full bg-black/30 rounded-lg px-4 py-3 outline-none border border-white/10 focus:border-fuchsia-400"/>
                </div>
                <NicheField {...{niche,setNiche,custom,setCustom,cfg,label:"Area / niche"}}/>
              </div>
              <button onClick={analyzePerson} disabled={personBusy}
                className="w-full bg-fuchsia-500 hover:bg-fuchsia-400 disabled:opacity-50 transition rounded-lg py-3 font-semibold text-black">
                {personBusy ? "Researching…" : "Analyze influence →"}
              </button>
              {personResult && <PersonCard r={personResult} cfg={cfg}/>}
            </div>
          )}
        </div>
      )}

      {/* CONFIRM */}
      {stage === "confirm" && est && (
        <div className="glass rounded-2xl p-6 space-y-4">
          <h2 className="text-xl font-semibold">Confirm run</h2>
          <p className="text-slate-300">Analyzing <span className="font-mono text-fuchsia-300">@{est.handle}</span> for the
            <span className="text-fuchsia-300"> "{activeNiche()}"</span> niche.</p>
          {est.mode && est.mode !== "custom" && (
            <div className="text-sm text-slate-300">
              Mode: <b className="text-fuchsia-200">{est.mode === "full" ? "Full account (cheap estimate)" : "Top 100 by reach (deep)"}</b>
              {" · "}{est.selection === "top" ? "highest-reach followers" : "random sample"}
              {" · "}{est.web_lookup ? "with web research" : "no web research"}
            </div>
          )}
          <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
            <Stat label="Pool scraped" value={fmt(est.to_scrape)} sub={est.cached_followers?`${fmt(est.cached_followers)} cached`:"bot-filtered free"}/>
            <Stat label="Real analyzed (est.)" value={`~${fmt(est.to_score)}`} sub={est.skip_bots?"after bot filter":""}/>
            <Stat label="Apify cost" value={usd(est.apify_cost)} sub={est.apify_mock?"mock — free":""}/>
            <Stat label="Haiku cost" value={usd(est.haiku_cost)} sub={est.anthropic_mock?"mock — free":""}/>
          </div>
          {est.web_lookups>0 && <p className="text-sm text-slate-400">+ ~{est.web_lookups} web research lookups ({usd(est.web_cost)})</p>}
          <p className="text-xs text-slate-500">Estimate assumes ~half the pool survives the bot filter; actual cost is often lower. Bots are scored free.</p>
          <div className="flex items-center justify-between border-t border-white/10 pt-4">
            <span className="text-slate-300">Estimated total</span>
            <span className="text-2xl font-bold text-fuchsia-300">{usd(est.total_cost)}</span>
          </div>
          <div className="flex gap-3">
            <button onClick={reset} className="px-5 py-3 rounded-lg border border-white/15 hover:bg-white/5">← Back</button>
            <button onClick={startRun} className="flex-1 bg-fuchsia-500 hover:bg-fuchsia-400 transition rounded-lg py-3 font-semibold text-black">
              Confirm & analyze
            </button>
          </div>
        </div>
      )}

      {/* RUNNING */}
      {stage === "running" && (
        <div className="glass rounded-2xl p-6 space-y-4">
          <div className="flex items-center gap-3">
            <div className="w-5 h-5 border-2 border-fuchsia-400 border-t-transparent rounded-full spin"></div>
            <h2 className="text-xl font-semibold">{progress?.phase || "Starting…"}</h2>
          </div>
          {progress && (
            <>
              <div className="h-3 rounded-full bg-white/10 overflow-hidden">
                <div className="h-full bg-gradient-to-r from-indigo-400 to-fuchsia-400 transition-all"
                  style={{width: (progress.total? (progress.scored/progress.total*100):5)+"%"}}/>
              </div>
              <div className="flex justify-between text-sm text-slate-400">
                <span>{fmt(progress.scored)} / {fmt(progress.total)} scored {progress.skipped?`· ${progress.skipped} skipped`:""}</span>
                <span>spent this run: <span className="text-fuchsia-300">{usd(progress.spend.total)}</span></span>
              </div>
              <div className="bg-black/40 rounded-lg p-3 h-40 overflow-auto font-mono text-xs text-slate-400 space-y-0.5">
                {(progress.logs||[]).map((l,i)=><div key={i}>{l}</div>)}
              </div>
            </>
          )}
        </div>
      )}

      {/* DONE */}
      {stage === "done" && result && (
        <div className="space-y-5">
          <div className="grid md:grid-cols-3 gap-5">
            <div className="glass rounded-2xl p-6 flex flex-col items-center justify-center">
              <Gauge value={result.audience_score}/>
              <div className="mt-2 text-center text-xs text-slate-400">{result.score_basis || "audience score"}</div>
              {result.selection !== "top" && (
                <div className="mt-2 text-center text-sm text-slate-400">
                  real followers avg: <span className="text-slate-200 font-semibold">{result.real_audience_score}</span> / 100
                </div>
              )}
              <div className="mt-3 text-center">
                <div className="text-2xl font-bold text-red-300">{result.bot_rate}%</div>
                <div className="text-xs text-slate-400">bots / inactive (of {fmt(result.pool_size)} scanned)</div>
              </div>
            </div>
            <div className="glass rounded-2xl p-6 md:col-span-2">
              <h3 className="font-semibold mb-3 text-slate-300">Criterion breakdown (avg)</h3>
              <div className="space-y-3">
                {Object.values(result.criteria_avg).map((c,i)=><CriterionBar key={i} c={c}/>)}
              </div>
            </div>
          </div>

          <div className="grid md:grid-cols-3 gap-5">
            <div className="glass rounded-2xl p-6">
              <h3 className="font-semibold mb-3 text-slate-300">Tier distribution <span className="text-xs text-slate-500">(real sample)</span></h3>
              <Donut tiers={result.tiers}/>
              {result.projected && (
                <div className="mt-4 pt-3 border-t border-white/10">
                  <div className="text-xs text-slate-400 mb-2">Projected across the full account:</div>
                  <div className="flex flex-wrap gap-x-4 gap-y-1 text-sm">
                    <span><span className="text-red-300 font-semibold">{result.projected.Bots}%</span> bots</span>
                    {["A","B","C","D"].map(t=>(
                      <span key={t}><span className="font-semibold" style={{color:TIER_COLORS[t]}}>{result.projected[t]}%</span> {t}</span>
                    ))}
                  </div>
                </div>
              )}
            </div>
            <div className="glass rounded-2xl p-6 md:col-span-2">
              <h3 className="font-semibold mb-2 text-slate-300">Summary</h3>
              <p className="text-slate-200 leading-relaxed">{result.summary}</p>
              <div className="mt-4 flex flex-wrap gap-4 text-xs text-slate-400">
                <span>analyzed: {fmt(result.analyzed)} real of {fmt(result.pool_size)} pool</span>
                <span>bots flagged: {fmt(result.flagged_bots)} ({result.bot_rate}%)</span>
                <span>avg confidence: {result.avg_confidence}</span>
                <span>skipped: {fmt(result.skipped)}</span>
                <span>spent: {usd(result.spend.total)} (apify {usd(result.spend.apify)} · haiku {usd(result.spend.anthropic)})</span>
              </div>
            </div>
          </div>

          {(() => {
            const all = result.followers || result.top_followers || [];
            const q = query.trim().toLowerCase();
            const filtered = q
              ? all.filter(f => (f.screen_name||"").toLowerCase().includes(q) || (f.name||"").toLowerCase().includes(q))
              : all;
            const sorted = [...filtered].sort((a,b)=>
              sortBy === "followers"
                ? (b.followers_count||0) - (a.followers_count||0)
                : (b.total||0) - (a.total||0) || (b.followers_count||0) - (a.followers_count||0)
            );
            return (
              <div className="glass rounded-2xl p-6">
                <div className="flex flex-wrap items-center justify-between gap-3 mb-4">
                  <h3 className="font-semibold text-slate-300">All graded followers <span className="text-xs text-slate-500">({sorted.length})</span></h3>
                  <div className="flex items-center gap-2">
                    <input value={query} onChange={e=>setQuery(e.target.value)} placeholder="search handle / name"
                      className="bg-black/30 rounded-lg px-3 py-1.5 text-sm outline-none border border-white/10 focus:border-fuchsia-400"/>
                    <select value={sortBy} onChange={e=>setSortBy(e.target.value)}
                      className="bg-black/30 rounded-lg px-3 py-1.5 text-sm outline-none border border-white/10 focus:border-fuchsia-400">
                      <option value="grade">Sort by grade</option>
                      <option value="followers">Sort by followers</option>
                    </select>
                  </div>
                </div>
                <div className="overflow-auto max-h-[32rem]">
                  <table className="w-full text-sm">
                    <thead className="text-slate-400 text-left border-b border-white/10 sticky top-0 bg-[#0b1020]">
                      <tr>
                        <th className="py-2 pr-3">#</th><th className="pr-3">Handle</th><th className="pr-3">Followers</th>
                        <th className="pr-2">Grade</th><th className="pr-2">Tier</th>
                        <th className="pr-2" title="Niche relevance / 30">Rel</th>
                        <th className="pr-2" title="Real-world influence / 35">Inf</th>
                        <th className="pr-2" title="Authority / 20">Aut</th>
                        <th className="pr-2" title="Activity / 8">Act</th>
                        <th className="pr-2" title="Authenticity / 7">Acc</th>
                        <th>Why</th>
                      </tr>
                    </thead>
                    <tbody>
                      {sorted.map((f,i)=>(
                        <tr key={i} className="border-b border-white/5 hover:bg-white/5">
                          <td className="py-2 pr-3 text-slate-500">{i+1}</td>
                          <td className="pr-3">
                            <a className="text-fuchsia-300 hover:underline" target="_blank" href={"https://x.com/"+f.screen_name}>@{f.screen_name}</a>
                          </td>
                          <td className="pr-3 text-slate-400">{fmt(f.followers_count)}</td>
                          <td className="pr-2 font-semibold">{f.total}</td>
                          <td className="pr-2"><TierBadge tier={f.tier}/></td>
                          <td className="pr-2 text-slate-400">{f.niche_relevance}</td>
                          <td className="pr-2 text-slate-400">{f.influence_reach}</td>
                          <td className="pr-2 text-slate-400">{f.authority}</td>
                          <td className="pr-2 text-slate-400">{f.engagement_quality}</td>
                          <td className="pr-2 text-slate-400">{f.authenticity}</td>
                          <td className="text-slate-400 max-w-xs">{f.reasoning}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            );
          })()}

          <button onClick={reset} className="bg-fuchsia-500 hover:bg-fuchsia-400 transition rounded-lg px-6 py-3 font-semibold text-black">
            ↺ New analysis
          </button>
        </div>
      )}

      <footer className="mt-10 pt-5 border-t border-white/10 text-center text-xs text-slate-500">
        🧪 NicheFit is a demo / proof-of-concept. Scores are illustrative and not a validated product —
        the rubric, prompts, bot heuristics, and follower sampling would all need further fine-tuning for production use.
      </footer>
    </div>
  );
}

function Stat({ label, value, sub }) {
  return (
    <div className="bg-black/30 rounded-lg p-3">
      <div className="text-xs text-slate-400">{label}</div>
      <div className="text-lg font-semibold">{value}</div>
      {sub && <div className="text-[11px] text-slate-500">{sub}</div>}
    </div>
  );
}

function NicheField({ niche, setNiche, custom, setCustom, cfg, label }) {
  return (
    <div>
      <label className="block text-sm mb-1 text-slate-300">{label || "Niche"}</label>
      <select value={niche} onChange={e=>setNiche(e.target.value)}
        className="w-full bg-black/30 rounded-lg px-4 py-3 outline-none border border-white/10 focus:border-fuchsia-400">
        {cfg.niches.map(n=><option key={n} value={n}>{n}</option>)}
        <option value="__custom__">＋ custom…</option>
      </select>
      {niche === "__custom__" && (
        <input value={custom} onChange={e=>setCustom(e.target.value)} placeholder="e.g. edtech, longevity biotech"
          className="mt-2 w-full bg-black/30 rounded-lg px-4 py-3 outline-none border border-white/10 focus:border-fuchsia-400"/>
      )}
    </div>
  );
}

function PersonCard({ r, cfg }) {
  const color = r.total >= 80 ? "#22c55e" : r.total >= 60 ? "#84cc16" : r.total >= 40 ? "#f59e0b" : "#ef4444";
  return (
    <div className="border-t border-white/10 pt-4 space-y-3">
      <div className="flex items-center gap-3">
        <div className="text-4xl font-bold" style={{color}}>{r.total}</div>
        <div>
          <div className="flex items-center gap-2">
            <TierBadge tier={r.tier}/>
            <a className="text-fuchsia-300 hover:underline" target="_blank" href={"https://x.com/"+r.handle}>@{r.handle}</a>
          </div>
          <div className="text-xs text-slate-400">influence / fit for "{r.niche}" · grade {r.total}/100</div>
        </div>
      </div>
      <div className="space-y-2">
        {cfg.rubric.map((c,i)=><CriterionBar key={i} c={{label:c.label, max:c.max, avg:r[c.key]}}/>)}
      </div>
      <p className="text-sm text-slate-300"><b>Why:</b> {r.reasoning}</p>
      {r.research && <p className="text-xs text-slate-400"><b>Research:</b> {r.research}</p>}
      <div className="text-xs text-slate-500">
        confidence {r.confidence}{r.mock && r.mock.anthropic ? " · mock (heuristic)" : ` · spent ${usd(r.spend)}`}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
